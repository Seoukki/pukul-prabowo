<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pukul Bahlil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .bg-animated {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: bgMove 10s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .glass-strong {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        
        .marquee-content {
            display: inline-flex;
            animation: marquee 25s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .target-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .target-wrapper:active {
            transform: scaleY(0.85) scaleX(1.05);
        }
        
        .target-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(255, 255, 255, 0.1);
            transition: all 0.1s;
        }
        
        .target-wrapper:active .target-img {
            transform: scaleY(0.9) scaleX(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .hammer {
            position: fixed;
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 9999;
            display: none;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
        }
        
        .hammer.active {
            display: block;
            animation: hammerAnim 0.2s ease-out;
        }
        
        @keyframes hammerAnim {
            0% { transform: rotate(-60deg) scale(0.7) translateY(50px); }
            50% { transform: rotate(-10deg) scale(1.2); }
            100% { transform: rotate(0deg) scale(1); }
        }
        
        .score-pop {
            position: absolute;
            color: #FFD700;
            font-weight: 900;
            font-size: 32px;
            pointer-events: none;
            animation: scoreUp 0.8s ease-out forwards;
            text-shadow: 0 0 20px rgba(255, 215, 0, 1);
            z-index: 100;
        }
        
        @keyframes scoreUp {
            0% { transform: translateY(0) scale(0.3); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: scale(0.95);
        }
        
        .side-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            transition: all 0.2s;
        }
        
        .side-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .skew-item {
            transform: skewX(-8deg);
        }
        
        .unskew {
            transform: skewX(8deg);
        }
        
        .support-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            padding: 12px 20px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 50;
            box-shadow: 0 10px 40px rgba(245, 87, 108, 0.4);
        }
        
        .support-popup.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            color: #764ba2;
            border-radius: 50px;
            padding: 12px 24px;
            opacity: 0;
            transition: all 0.4s;
            z-index: 100;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .name-page {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .input-field {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 280px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .input-field:focus {
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.3);
        }
        
        .input-field::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        select.input-field {
            appearance: none;
            cursor: pointer;
        }
        
        .no-scroll { overflow: hidden; }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="text-white no-scroll">
    <div class="bg-animated"></div>
    
    <!-- Hammer -->

            <option value="Jawa Tengah">Jawa Tengah</option>
            <option value="Jawa Timur">Jawa Timur</option>
            <option value="Kalimantan Barat">Kalimantan Barat</option>
            <option value="Kalimantan Selatan">Kalimantan Selatan</option>
            <option value="Kalimantan Tengah">Kalimantan Tengah</option>
            <option value="Kalimantan Timur">Kalimantan Timur</option>

            <option value="Nusa Tenggara Barat">Nusa Tenggara Barat</option>
            <option value="Nusa Tenggara Timur">Nusa Tenggara Timur</option>
            <option value="Papua">Papua</option>
            <option value="Papua Barat">Papua Barat</option>
            <option value="Papua Barat Daya">Papua Barat Daya</option>
            <option value="Papua Pegunungan">Papua Pegunungan</option>
            <option value="Papua Selatan">Papua Selatan</option>
            <option value="Riau">Riau</option>
            <option value="Sulawesi Barat">Sulawesi Barat</option>
            <option value="Sulawesi Selatan">Sulawesi Selatan</option>

            MULAI MAIN

    </div>

    <!-- Main Game -->
    <div id="main-game" class="relative w-full h-full flex flex-col max-w-md mx-auto p-3 z-10 hidden">
        
        <!-- Header -->
        <div class="glass rounded-2xl p-3 mb-2 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-lg">🌍</span>
                <div>
                    <p class="text-[9px] text-white/70 uppercase tracking-wider">Total Pukulan</p>
                    <p id="global-score" class="font-bold text-sm text-yellow-300">×0</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-white/70 uppercase tracking-wider">Provinsi</p>
                <p id="user-province" class="font-bold text-xs text-white">-</p>

        </div>

        <!-- Compact Leaderboard -->
        <div class="mb-2">
            <h3 class="text-center font-bold text-[10px] mb-1 text-white/80 uppercase tracking-wider">
                <i class="fas fa-trophy text-yellow-300 mr-1"></i> Leaderboard
            </h3>
            <div class="marquee-container glass rounded-lg py-1.5">
                <div class="marquee-content" id="leaderboard-marquee"></div>
            </div>
        </div>

        <!-- Compact Top Winners -->
        <div class="glass rounded-xl p-1.5 mb-2">
            <h4 class="text-center font-bold text-[8px] mb-1 text-white/80 uppercase">
                <i class="fas fa-bolt text-yellow-300 mr-1"></i> Top Winners
            </h4>
            <div class="marquee-container">
                <div class="marquee-content" id="winners-marquee" style="animation-duration: 20s;"></div>
            </div>
        </div>

        <!-- Compact Donors -->
        <div class="glass rounded-xl p-1.5 mb-2">
            <h4 class="text-center font-bold text-[8px] mb-1 text-white/80 uppercase">
                <i class="fas fa-gem text-pink-300 mr-1"></i> Top Supporter
            </h4>
            <div class="marquee-container">
                <div class="marquee-content" id="donation-marquee" style="animation-duration: 22s;"></div>
            </div>
        </div>

        <!-- Game Area -->
        <div class="flex-1 flex flex-col items-center justify-center relative">
            
            <div class="target-wrapper float-anim mb-4" id="game-target">
                <div class="absolute inset-0 bg-white rounded-full blur-3xl opacity-20 animate-pulse"></div>
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&crop=face" 
                     class="target-img relative z-10" 
                     alt="Target">
            </div>

            <div class="text-center mb-4">
                <p class="text-white/70 text-[10px] uppercase tracking-widest mb-1">Total Pukulan Saya</p>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-2xl">🥊</span>
                    <span id="user-score" class="text-5xl font-black text-yellow-300" style="text-shadow: 0 0 30px rgba(253, 224, 71, 0.5);">0</span>
                </div>
            </div>

            <!-- Only Main Button -->
            <button onclick="showSupportPopup()" class="btn-primary rounded-xl py-3 px-6 font-bold text-sm flex items-center justify-center gap-2">
                <i class="fas fa-heart"></i> DUKUNG KAMI
            </button>
        </div>

        <!-- Side Menu - Simplified -->
        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col gap-2">
            <button onclick="openProfile()" class="side-btn w-10 h-10 rounded-full flex items-center justify-center">
                <i class="fas fa-user text-sm"></i>
            </button>
            <button onclick="toggleSound()" id="sound-btn" class="side-btn w-10 h-10 rounded-full flex items-center justify-center">
                <i class="fas fa-volume-up text-sm"></i>
            </button>
        </div>
    </div>

    <!-- Support Popup -->
    <div id="support-popup" class="support-popup">
        <div class="flex items-center gap-3">
            <i class="fas fa-heart text-white text-xl animate-pulse"></i>
            <div>
                <p class="font-bold text-white text-sm">Dukung di Saweria!</p>
            </div>
            <button onclick="openSaweria()" class="bg-white/20 px-3 py-1 rounded-lg text-white font-bold text-xs">
                DONASI
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Profile Modal -->
    <div id="modal-profile" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-strong rounded-3xl p-6 w-full max-w-sm text-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black text-gray-800">Profil</h2>
                <button onclick="closeModal('modal-profile')" class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
                    <i class="fas fa-times text-gray-600"></i>
                </button>
            </div>
            
            <div class="text-center">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl text-white">
                    <i class="fas fa-user"></i>
                </div>
                <h2 id="prof-name" class="text-xl font-bold mb-1 text-gray-800">-</h2>
                <p id="prof-province" class="text-purple-600 text-sm mb-4">-</p>
                
                <div class="bg-gray-100 rounded-xl p-4 mb-4">
                    <p class="text-xs text-gray-500 mb-1 uppercase">Total Pukulan</p>
                    <div class="flex items-center justify-center gap-2">
                        <span class="text-2xl">🥊</span>
                        <span id="prof-score" class="text-3xl font-black text-purple-600">0</span>
                    </div>
                </div>

                <button onclick="shareScore()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl py-3 font-bold text-white">
                    <i class="fas fa-share-alt mr-2"></i> Bagikan
                </button>
            </div>
        </div>
    </div>

    <script>
        // Database Config
        const SUPABASE_URL = 'https://hlibeatwmolpzrckmtdb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaWJlYXR3bW9scHpyY2ttdGRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk4NjUwMDAsImV4cCI6MjAyNTQ0MTAwMH0.ESV93ymrEuo5iLIei-Uo3w_oYN0g0gB';
        
        let supabaseClient = null;
        
        // Initialize Supabase with error handling
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase initialized');
            }
        } catch(e) {
            console.error('Supabase init failed:', e);
        }

        // State
        const state = {
            userId: localStorage.getItem('userId') || 'usr_' + Date.now(),
            name: localStorage.getItem('userName') || '',
            province: localStorage.getItem('province') || '',
            score: parseInt(localStorage.getItem('score')) || 0,
            sound: localStorage.getItem('sound') !== 'false',
            globalScore: parseInt(localStorage.getItem('globalScore')) || 0
        };

        // Check if user data exists
        document.addEventListener('DOMContentLoaded', () => {
            if (!state.name || !state.province) {
                showNamePage();
            } else {
                showGamePage();
            }
        });

        function showNamePage() {
            document.getElementById('name-page').classList.remove('hidden');
            document.getElementById('main-game').classList.add('hidden');
        }

        function showGamePage() {
            document.getElementById('name-page').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            initGame();
        }

        function saveUserData() {
            const nameInput = document.getElementById('name-input');
            const provinceInput = document.getElementById('province-input');
            
            const name = nameInput.value.trim();
            const province = provinceInput.value;
            
            if (!name) {
                showToast('Masukkan nama!');
                return;
            }
            if (!province) {
                showToast('Pilih provinsi!');
                return;
            }
            
            state.name = name;
            state.province = province;
            state.userId = 'usr_' + Date.now();
            
            localStorage.setItem('userName', name);
            localStorage.setItem('province', province);
            localStorage.setItem('userId', state.userId);
            localStorage.setItem('score', '0');
            
            showGamePage();
        }

        function initGame() {
            initMarquees();
            updateUI();
            setupTarget();
            loadFromDatabase();
            
            // Show support popup periodically
            setTimeout(() => {
                document.getElementById('support-popup').classList.add('show');
                setTimeout(() => document.getElementById('support-popup').classList.remove('show'), 4000);
            }, 2000);
            
            setInterval(() => {
                const popup = document.getElementById('support-popup');
                popup.classList.add('show');
                setTimeout(() => popup.classList.remove('show'), 4000);
            }, 25000);
        }

        function initMarquees() {
            // Leaderboard with user
            const allProvinces = [
                'Aceh', 'Bali', 'Banten', 'Bengkulu', 'DI Yogyakarta', 'DKI Jakarta',
                'Gorontalo', 'Jambi', 'Jawa Barat', 'Jawa Tengah', 'Jawa Timur',
                'Kalimantan Barat', 'Kalimantan Selatan', 'Kalimantan Tengah',
                'Kalimantan Timur', 'Kalimantan Utara', 'Kepulauan Bangka Belitung',
                'Kepulauan Riau', 'Lampung', 'Maluku', 'Maluku Utara',
                'Nusa Tenggara Barat', 'Nusa Tenggara Timur', 'Papua', 'Papua Barat',
                'Papua Barat Daya', 'Papua Pegunungan', 'Papua Selatan', 'Riau',
                'Sulawesi Barat', 'Sulawesi Selatan', 'Sulawesi Tengah',
                'Sulawesi Tenggara', 'Sulawesi Utara', 'Sumatera Barat',
                'Sumatera Selatan', 'Sumatera Utara'
            ];
            
            const lbContainer = document.getElementById('leaderboard-marquee');
            let lbHTML = '';
            
            allProvinces.forEach(prov => {
                const isUser = prov === state.province;
                const score = isUser ? state.score : Math.floor(Math.random() * 1000);
                const bgClass = isUser ? 'bg-white/20 border border-white/40' : '';
                const textClass = isUser ? 'text-yellow-300' : 'text-white';
                
                lbHTML += `<div class="glass px-2 py-0.5 rounded mx-1 skew-item ${bgClass}"><span class="unskew text-[9px] font-bold ${textClass}">${prov} <span class="text-white/70">${score}</span></span></div>`;
            });
            lbContainer.innerHTML = lbHTML + lbHTML;

            // Winners
            const winners = ['imut', 'araa', 'rijal', 'budi', 'siti', 'andi', 'maya', 'dedi'];
            const winContainer = document.getElementById('winners-marquee');
            let winHTML = '';
            winners.forEach(w => {
                const wins = Math.floor(Math.random() * 10) + 1;
                winHTML += `<div class="glass px-2 py-0.5 rounded-full mx-1 skew-item"><span class="unskew text-[8px] text-white">🏅 ${w} <span class="text-green-300">${wins}</span></span></div>`;
            });
            winContainer.innerHTML = winHTML + winHTML;

            // Donations
            const donors = ['hamba_allah', 'lia', 'rafaana', 'budi', 'ani', 'supporter', 'peduli', 'dari_hati'];
            const amounts = [10000, 15000, 20000, 25000, 30000, 35000, 40000, 45000, 50000];
            const donContainer = document.getElementById('donation-marquee');
            let donHTML = '';
            donors.forEach(d => {
                const amt = amounts[Math.floor(Math.random() * amounts.length)];
                donHTML += `<div class="glass px-2 py-0.5 rounded-full mx-1 skew-item border border-pink-300/30"><span class="unskew text-[8px]"><span class="text-pink-300 font-bold">Rp${(amt/1000).toFixed(0)}k</span> <span class="text-white/70">${d}</span></span></div>`;
            });
            donContainer.innerHTML = donHTML + donHTML;
        }

        function setupTarget() {
            const target = document.getElementById('game-target');
            
            const handleHit = (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const touch = e.touches ? e.touches[0] : e;
                const rect = target.getBoundingClientRect();
                const x = touch.clientX || rect.left + rect.width/2;
                const y = touch.clientY || rect.top + rect.height/2;
                
                // Hammer
                const hammer = document.getElementById('hammer');
                hammer.style.left = (x - 40) + 'px';
                hammer.style.top = (y - 40) + 'px';
                hammer.classList.add('active');
                setTimeout(() => hammer.classList.remove('active'), 200);
                
                // Score popup
                const popup = document.createElement('div');
                popup.className = 'score-pop';
                popup.textContent = '+1';
                popup.style.left = x + 'px';
                popup.style.top = (y - 50) + 'px';
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 800);
                
                // Update scores
                state.score++;
                state.globalScore++;
                
                // Save to localStorage immediately
                localStorage.setItem('score', state.score);
                localStorage.setItem('globalScore', state.globalScore);
                
                updateUI();
                updateLeaderboardScore();
                saveToDatabase();
                
                if (state.sound) playSound();
                
                // Confetti every 50
                if (state.score % 50 === 0) {
                    createConfetti();
                    showToast(`🎉 ${state.score} Pukulan!`);
                }
            };
            
            target.addEventListener('click', handleHit);
            target.addEventListener('touchstart', handleHit, {passive: false});
        }

        function updateLeaderboardScore() {
            // Update user score in marquee
            const marquees = document.querySelectorAll('#leaderboard-marquee .skew-item');
            marquees.forEach(item => {
                const text = item.textContent;
                if (text.includes(state.province)) {
                    const span = item.querySelector('span span');
                    if (span) span.textContent = state.score;
                }
            });
        }

        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 600 + Math.random() * 400;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        function createConfetti() {
            const colors = ['#FFD700', '#FF69B4', '#00CED1', '#FF6347', '#7B68EE'];
            for (let i = 0; i < 20; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                c.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function updateUI() {
            document.getElementById('user-score').textContent = state.score.toLocaleString('id-ID');
            document.getElementById('global-score').textContent = '×' + state.globalScore.toLocaleString('id-ID');
            document.getElementById('user-province').textContent = state.province;
            document.getElementById('prof-name').textContent = state.name;
            document.getElementById('prof-province').textContent = state.province;
            document.getElementById('prof-score').textContent = state.score.toLocaleString('id-ID');
            
            // Update sound icon
            const icon = document.querySelector('#sound-btn i');
            if (icon) {
                icon.className = state.sound ? 'fas fa-volume-up text-sm' : 'fas fa-volume-mute text-sm';
            }
        }

        async function saveToDatabase() {
            if (!supabaseClient) {
                console.log('Supabase not available, using localStorage only');
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('players')
                    .upsert({
                        id: state.userId,
                        name: state.name,
                        province: state.province,
                        score: state.score,
                        updated_at: new Date().toISOString()
                    }, {
                        onConflict: 'id'
                    });
                
                if (error) {
                    console.error('Save error:', error);
                } else {
                    console.log('Saved to database');
                }
            } catch(e) {
                console.error('Database error:', e);
            }
        }

        async function loadFromDatabase() {
            if (!supabaseClient) return;
            
            try {
                // Load user's score
                const { data, error } = await supabaseClient
                    .from('players')
                    .select('score')
                    .eq('id', state.userId)
                    .single();
                
                if (data && data.score > state.score) {
                    state.score = data.score;
                    localStorage.setItem('score', state.score);
                    updateUI();
                    updateLeaderboardScore();
                }
                
                // Calculate global score
                const { data: allPlayers, error: countError } = await supabaseClient
                    .from('players')
                    .select('score');
                
                if (allPlayers) {
                    const total = allPlayers.reduce((sum, p) => sum + (p.score || 0), 0);
                    state.globalScore = total;
                    localStorage.setItem('globalScore', state.globalScore);
                    updateUI();
                }
            } catch(e) {
                console.error('Load error:', e);
            }
        }

        function openProfile() {
            document.getElementById('modal-profile').classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function toggleSound() {
            state.sound = !state.sound;
            localStorage.setItem('sound', state.sound);
            updateUI();
            showToast(state.sound ? '🔊 Sound ON' : '🔇 Sound OFF');
        }

        function showSupportPopup() {
            const popup = document.getElementById('support-popup');
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 4000);
        }

        function openSaweria() {
            window.open('https://saweria.co', '_blank');
        }

        function shareScore() {
            const text = `🔥 ${state.name} memukul ${state.score.toLocaleString('id-ID')}x di Pukul Bahlil!`;
            if (navigator.share) {
                navigator.share({title: 'Pukul Bahlil', text: text});
            } else {
                navigator.clipboard.writeText(text);
                showToast('📋 Disalin!');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Close modal on outside click
        window.onclick = (e) => {
            if (e.target.id === 'modal-profile') {
                closeModal('modal-profile');
            }
        };
    </script>
</body>
</html>
